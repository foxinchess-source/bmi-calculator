<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light" data-language="en">
    <div class="page-controls">
        <button type="button" id="theme-toggle" class="icon-button" aria-label="Переключить тему" data-ru-label="Переключить тему" data-en-label="Toggle theme">☀️</button>
        <button type="button" id="lang-toggle" class="icon-button" aria-label="Переключить язык" data-ru-label="Переключить язык" data-en-label="Toggle language">🇷🇺</button>
    </div>
    <main class="container">
        <section class="bmi-card">
            <div class="bmi-card__top">
                <h1 data-ru="ИМТ калькулятор" data-en="BMI Calculator">ИМТ калькулятор</h1>
            </div>
            <p data-ru="Введите данные, чтобы узнать свой индекс массы тела." data-en="Enter your details to find your body mass index.">Введите данные, чтобы узнать свой индекс массы тела.</p>
            <form id="bmi-form" class="bmi-form">
                <label for="weight" data-ru="Вес (кг)" data-en="Weight (kg)">Вес (кг)</label>
                <input type="number" id="weight" name="weight" min="1" step="0.1" required>

                <label for="height" data-ru="Рост (см)" data-en="Height (cm)">Рост (см)</label>
                <input type="number" id="height" name="height" min="1" step="0.1" required>

                <button type="submit" id="calculate-button" data-ru="Рассчитать ИМТ" data-en="Calculate BMI">Рассчитать ИМТ</button>
            </form>

            <div id="result" class="bmi-result" aria-live="polite"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
